<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vitrine Pièces Mécaniques</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0a0a0a;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      background: linear-gradient(90deg, #00f5d4, #000);
    }

    h1 {
      font-weight: bold;
      font-size: 2.5rem;
    }

    .filters {
      text-align: center;
      margin: 20px;
    }

    button {
      background-color: #00f5d4;
      color: black;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
      transition: 0.3s;
    }

    button:hover {
      background-color: white;
      color: #00f5d4;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      padding: 20px;
      gap: 20px;
    }

    .card {
      background-color: #111;
      border: 1px solid #00f5d4;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .card h3 {
      color: #00f5d4;
      margin: 10px 0;
    }
  </style>

</head>
<body>

  <header>
    <h1>🔩 Mechanical Parts Showcase</h1>
    <p>Découvrez les formes : vis, boulons, roulements, engrenages</p>
  </header>

  <section class="filters">
    <button onclick="filterSelection('all')">Tous</button>
    <button onclick="filterSelection('vis')">Vis</button>
    <button onclick="filterSelection('boulon')">Boulons</button>
    <button onclick="filterSelection('roulement')">Roulements</button>
    <button onclick="filterSelection('engrenage')">Engrenages</button>
  </section>

  <section class="gallery" id="gallery"></section>

  <script src="script.js"></script>
</body>
</html>
